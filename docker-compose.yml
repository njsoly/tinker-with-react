services:
  # Placeholder for future services (postgres, redis, etc.)
  # Spring Boot Docker Compose support will manage these during development
  
  # Example service template (uncomment when needed):
  postgres:
    image: postgres:17-alpine
    container_name: postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: tinker
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/init-pg.sql:/docker-entrypoint-initdb.d/init-pg.sql:z

volumes:
  postgres_data:
