spring:
  application:
    name: portfolio-backend
  datasource:
    url: jdbc:h2:mem:portfoliodb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 36546

logging:
  level:
    org.njsoly: DEBUG
